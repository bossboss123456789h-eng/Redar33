        /* الإطار المنزلق (iframe) */

        /* خط مسح ضوئي متحرك */

<body>
    <!-- قماش الجزيئات -->
    <canvas id="particle-canvas"></canvas>

    <!-- خط المسح الضوئي -->
    <div class="scan-line"></div>

    <div class="container">
        <!-- الرأس -->
        <div class="header">
            <img src="https://i.postimg.cc/Z5ct06Lm/Screenshot-20260315-194604.jpg" alt="Left Penguin" class="penguin">
            <h1>@ridermax707</h1>
            <img src="https://i.postimg.cc/h4zBMzKT/Screenshot-20260315-194622.jpg" alt="Right Penguin" class="penguin">
        </div>

        <!-- اختيار الإصدار (فقط 9.00) -->
        <div class="version-grid">
            <div class="card active" data-v="9.00">9.00 <small>مستقر</small></div>
            <!-- تم إزالة 11.00 و 5.05 -->
        </div>

        <!-- الأزرار -->
        <div class="btn" onclick="startHack()">💀 هكرني اوبن بنيه</div>
        <div class="btn goldhen" onclick="downloadGoldhen()">📦 تحميل GoldHEN</div>

        <!-- سجل الأحداث -->
        <div class="log" id="log"></div>

        <!-- الإطار المنزلق -->
        <div id="exploitFrame">
            <iframe id="frame" src="about:blank"></iframe>
        </div>

        <!-- تم إزالة التذييل بالكامل -->
    </div>

    <script>
        // ========== جزيئات الخلفية ==========
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        function initParticles() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            const particleCount = 120;
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    size: Math.random() * 2 + 1,
                    color: `rgba(${Math.floor(50 + Math.random() * 100)}, ${Math.floor(150 + Math.random() * 100)}, 255, ${Math.random() * 0.5 + 0.3})`
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, width, height);
            
            // وصلات بين الجزيئات
            ctx.strokeStyle = '#00aaff20';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 120) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(0, 170, 255, ${0.2 * (1 - distance/120)})`;
                        ctx.stroke();
                    }
                }
            }

            // رسم الجزيئات
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.shadowColor = '#00aaff';
                ctx.shadowBlur = 10;
                ctx.fill();
                
                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0) p.x = width;
                if (p.x > width) p.x = 0;
                if (p.y < 0) p.y = height;
                if (p.y > height) p.y = 0;
            });

            requestAnimationFrame(drawParticles);
        }

        window.addEventListener('resize', initParticles);
        initParticles();
        drawParticles();

        // ========== منطق الموقع (فقط 9.00) ==========
        const logDiv = document.getElementById('log');
        const exploitFrame = document.getElementById('exploitFrame');
        const exploitIframe = document.getElementById('frame');
        // لا حاجة لاختيار الإصدارات الأخرى، الثابت هو 9.00
        const selectedVersion = '9.00';

        function addLog(message) {
            const entry = document.createElement('div');
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function startHack() {
            addLog('🚀 فتح الهوست الحقيقي...');

            // رابط مخصص للإصدار 9.00
            const exploitUrl = 'https://bex19.github.io/313/?i=1'; // مثال لموقع 9.00

            exploitIframe.src = exploitUrl;
            exploitFrame.style.bottom = '0';

            const checkInteraction = setInterval(() => {
                if (document.activeElement === exploitIframe) {
                    addLog('📡 تم التفاعل مع الهوست...');
                    clearInterval(checkInteraction);

                    setTimeout(() => {
                        closeExploit();
                    }, 6000);
                }
            }, 500);

            setTimeout(() => {
                clearInterval(checkInteraction);
                if (exploitFrame.style.bottom === '0px') {
                    addLog('⚠️ انتهت المهلة، إغلاق تلقائي');
                    closeExploit();
                }
            }, 20000);
        }

        function closeExploit() {
            exploitFrame.style.bottom = '-100%';
            exploitIframe.src = 'about:blank';
            addLog('🎉 هاي تهكيره مني لكه');
            addLog('🔥 GoldHEN مفعل بنجاح');
        }

        function downloadGoldhen() {
            addLog('📦 فتح صفحة تحميل GoldHEN...');
            window.open('https://github.com/GoldHEN/GoldHEN/releases/latest', '_blank');
        }

        if (window.location.search.includes('i=1')) {
            setTimeout(() => {
                addLog('⚡ وضع تلقائي (i=1)');
                startHack();
            }, 1500);
        }
    </script>
</body>
