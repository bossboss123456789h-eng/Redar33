<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@ridermax077 | PRO HOST (نسخة راقية)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0b1120 0%, #1a2639 100%);
            color: #e0e0e0;
            text-align: center;
            direction: rtl;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }

        /* خلفية ناعمة مع نص هكر خفيف */
        .hacker-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.03;
            font-family: 'Courier New', monospace;
            color: #4aa3ff;
            font-size: 14px;
            line-height: 1.4;
            white-space: pre;
            overflow: hidden;
            user-select: none;
        }

        /* رأس الصفحة بتصميم راقي */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            background: rgba(18, 25, 40, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            border-radius: 60px;
            border: 1px solid rgba(0, 255, 170, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 255, 170, 0.2);
            z-index: 1;
        }

        .penguin {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid rgba(0, 255, 170, 0.8);
            box-shadow: 0 0 15px rgba(0, 255, 170, 0.5);
            animation: softGlow 3s infinite alternate;
        }

        @keyframes softGlow {
            0% { opacity: 1; filter: brightness(1); border-color: #00ffaa; box-shadow: 0 0 15px #00ffaa; }
            100% { opacity: 0.9; filter: brightness(1.1); border-color: #00ccff; box-shadow: 0 0 25px #00ccff; }
        }

        h1 {
            color: #ffffff;
            font-size: 3.5rem;
            font-weight: 400;
            text-shadow: 0 2px 10px rgba(0, 255, 170, 0.5);
            letter-spacing: 2px;
        }

        h1 span {
            color: #00ffaa;
            font-weight: 600;
        }

        /* شبكة الإصدارات */
        .version-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin: 30px 0;
            z-index: 1;
        }

        .card {
            background: rgba(20, 30, 45, 0.7);
            backdrop-filter: blur(5px);
            padding: 20px 30px;
            border-radius: 30px;
            border: 1px solid #2a3a55;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.8rem;
            font-weight: 500;
            color: #ccddee;
            min-width: 120px;
        }

        .card:hover {
            border-color: #00ffaa;
            box-shadow: 0 0 20px rgba(0, 255, 170, 0.3);
            transform: translateY(-2px);
            background: rgba(30, 40, 60, 0.8);
        }

        .card.active {
            border-color: #00ffaa;
            background: rgba(0, 255, 170, 0.1);
            color: #00ffaa;
            box-shadow: 0 0 25px rgba(0, 255, 170, 0.3);
        }

        .card small {
            display: block;
            font-size: 0.8rem;
            color: #8899aa;
            margin-top: 5px;
        }

        /* الأزرار */
        .btn {
            background: linear-gradient(145deg, #1e2b3c, #15212e);
            color: #00ffaa;
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 1.8rem;
            font-weight: 500;
            cursor: pointer;
            margin: 12px auto;
            border: 1px solid #00ffaa;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.6);
            transition: all 0.2s ease;
            width: fit-content;
            display: inline-block;
            z-index: 1;
            position: relative;
            backdrop-filter: blur(4px);
        }

        .btn:hover {
            background: #00ffaa;
            color: #0b1120;
            border-color: #00ffaa;
            box-shadow: 0 0 30px #00ffaa, 0 8px 20px rgba(0, 0, 0, 0.4);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 0 20px #00ffaa;
        }

        .btn.goldhen {
            border-color: #ffaa33;
            color: #ffaa33;
        }

        .btn.goldhen:hover {
            background: #ffaa33;
            color: #0b1120;
            box-shadow: 0 0 30px #ffaa33;
        }

        /* سجل الأحداث */
        .log {
            background: rgba(10, 18, 28, 0.8);
            backdrop-filter: blur(5px);
            border: 1px solid #2a3a55;
            border-radius: 20px;
            margin-top: 30px;
            padding: 15px;
            height: 150px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            text-align: left;
            direction: ltr;
            width: 100%;
            max-width: 700px;
            font-size: 0.95rem;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
            z-index: 1;
        }

        .log div {
            padding: 4px 8px;
            border-right: 3px solid #00ffaa;
            margin: 5px 0;
            background: rgba(0, 20, 40, 0.4);
            border-radius: 6px;
        }

        /* الإطار المنزلق */
        #exploitFrame {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0f1a;
            transition: bottom 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 9999;
            box-shadow: 0 -5px 40px rgba(0, 255, 170, 0.2);
        }

        #exploitFrame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* تذييل */
        .footer {
            margin-top: 40px;
            color: #667788;
            font-size: 0.9rem;
            z-index: 1;
        }

        /* النص المتحرك (شريط علوي) */
        .hacker-slide {
            position: fixed;
            top: -70px;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            color: #00ffaa;
            text-align: center;
            font-size: 2rem;
            font-weight: 400;
            padding: 15px;
            border-bottom: 2px solid #00ffaa;
            box-shadow: 0 0 40px #00ffaa;
            z-index: 10000;
            animation: slideDownFade 8s forwards;
            letter-spacing: 2px;
        }

        @keyframes slideDownFade {
            0% { top: -70px; opacity: 0; }
            10% { top: 0; opacity: 1; }
            90% { top: 0; opacity: 1; }
            100% { top: -70px; opacity: 0; }
        }

        /* رسالة النجاح */
        .success-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid #00ffaa;
            border-radius: 40px;
            padding: 30px 50px;
            font-size: 3rem;
            color: #00ffaa;
            text-shadow: 0 0 30px #00ffaa;
            box-shadow: 0 0 80px #00ffaa;
            z-index: 10001;
            animation: popFade 0.5s ease-out forwards;
            white-space: nowrap;
            font-weight: 400;
            letter-spacing: 2px;
        }

        @keyframes popFade {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        /* نصوص الخلفية الهادئة */
        .hacker-text {
            position: fixed;
            color: #2a6f9c;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: 400;
            text-shadow: 0 0 5px #00aaff;
            z-index: 0;
            pointer-events: none;
            opacity: 0.2;
            white-space: nowrap;
            animation: floatText 20s linear infinite;
        }

        @keyframes floatText {
            0% { transform: translateY(0) translateX(0); }
            100% { transform: translateY(-100px) translateX(20px); }
        }

        /* تنسيقات خاصة للنصوص */
        .arabic {
            font-family: 'Traditional Arabic', 'Amiri', serif;
        }
        .assyrian {
            font-family: 'Estrangelo Edessa', 'Segoe UI Historic', sans-serif;
        }
    </style>
</head>
<body>
    <div class="hacker-bg" id="hackerBg"></div>

    <div class="header">
        <img src="https://i.postimg.cc/Z5ct06Lm/Screenshot-20260315-194604.jpg" alt="Left Penguin" class="penguin">
        <h1><span>@ridermax077</span> 💀</h1>
        <img src="https://i.postimg.cc/h4zBMzKT/Screenshot-20260315-194622.jpg" alt="Right Penguin" class="penguin">
    </div>

    <!-- اختيار الإصدار -->
    <div class="version-grid">
        <div class="card active" data-v="9.00">9.00 <small>مستقر</small></div>
        <div class="card" data-v="11.00">11.00 <small>تجريبي</small></div>
        <div class="card" data-v="5.05">5.05 <small>قديم</small></div>
    </div>

    <!-- الأزرار -->
    <div class="btn" onclick="startHack()">💀 هكرني اوبن بنيه</div>
    <div class="btn goldhen" onclick="downloadGoldhen()">📦 تحميل GoldHEN</div>

    <!-- سجل الأحداث -->
    <div class="log" id="log"></div>

    <!-- الإطار المنزلق -->
    <div id="exploitFrame">
        <iframe id="frame" src="about:blank"></iframe>
    </div>

    <div class="footer">
        <p>© 2026 @ridermax077 | جميع الحقوق محفوظة</p>
    </div>

    <script>
        // عناصر الصفحة
        const logDiv = document.getElementById('log');
        const exploitFrame = document.getElementById('exploitFrame');
        const exploitIframe = document.getElementById('frame');
        const cards = document.querySelectorAll('.card');
        let selectedVersion = '9.00';

        // أحداث اختيار الإصدار
        cards.forEach(card => {
            card.addEventListener('click', () => {
                cards.forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                selectedVersion = card.dataset.v;
                addLog(`تم اختيار الإصدار ${selectedVersion}`);
            });
        });

        // دالة إضافة سجل
        function addLog(message) {
            const entry = document.createElement('div');
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        // شريط متحرك
        function showHackerSlide() {
            const slide = document.createElement('div');
            slide.className = 'hacker-slide';
            slide.textContent = '🔻 انزل من الشاشه كا انهو هكر 🔻';
            document.body.appendChild(slide);
            setTimeout(() => slide.remove(), 8000);
        }

        // رسالة النجاح
        function showSuccessMessage() {
            const popup = document.createElement('div');
            popup.className = 'success-popup';
            popup.textContent = '🔥 هكر مني لكه !! 🔥';
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 3000);
        }

        // نصوص هكر خلفية (خفيفة)
        function createHackerTexts() {
            const texts = [
                '@ridermax077', 'بيتك كضومي', 'كضومي هاك', 'بغداد تايم', 'عراق هكر',
                'ܐܬܐ ܕܚܫܘܟܐ', 'ܫܠܡܐ ܥܠ ܣܝܣܛܡ', 'فكيت الشيفرة', 'دخلت سيستماك',
                'ROOT', 'EXPLOIT', 'SHELL', '0DAY', 'ACCESS GRANTED'
            ];
            for (let i = 0; i < 10; i++) {
                const span = document.createElement('div');
                span.className = 'hacker-text';
                span.textContent = texts[Math.floor(Math.random() * texts.length)];
                span.style.left = Math.random() * 100 + '%';
                span.style.top = Math.random() * 100 + '%';
                span.style.animationDuration = (15 + Math.random() * 20) + 's';
                span.style.animationDelay = Math.random() * 5 + 's';
                span.style.opacity = 0.1 + Math.random() * 0.1;
                document.body.appendChild(span);
                setTimeout(() => span.remove(), 20000);
            }
        }

        // بدء الهكر
        function startHack() {
            addLog('🚀 فتح الهوست الحقيقي...');
            showHackerSlide();
            createHackerTexts();

            let exploitUrl = '';
            if (selectedVersion === '9.00') exploitUrl = 'https://bex19.github.io/313/?i=1';
            else if (selectedVersion === '11.00') exploitUrl = 'https://nightkinghost.com';
            else if (selectedVersion === '5.05') exploitUrl = 'https://leeful.github.io';

            exploitIframe.src = exploitUrl;
            exploitFrame.style.bottom = '0';

            const checkInteraction = setInterval(() => {
                if (document.activeElement === exploitIframe) {
                    addLog('📡 تم التفاعل مع الهوست...');
                    clearInterval(checkInteraction);
                    setTimeout(() => closeExploit(), 6000);
                }
            }, 500);

            setTimeout(() => {
                clearInterval(checkInteraction);
                if (exploitFrame.style.bottom === '0px') {
                    addLog('⚠️ انتهت المهلة، إغلاق تلقائي');
                    closeExploit();
                }
            }, 20000);
        }

        function closeExploit() {
            exploitFrame.style.bottom = '-100%';
            exploitIframe.src = 'about:blank';
            addLog('🎉 هاي تهكيره مني لكه');
            addLog('🔥 GoldHEN مفعل بنجاح');
            showSuccessMessage();
            createHackerTexts();
        }

        // تحميل GoldHEN (أحدث إصدار)
        function downloadGoldhen() {
            addLog('📦 جاري التوجيه إلى أحدث إصدار GoldHEN...');
            window.open('https://github.com/GoldHEN/GoldHEN/releases/latest', '_blank');
        }

        // تشغيل تلقائي
        if (window.location.search.includes('i=1')) {
            setTimeout(() => {
                addLog('⚡ وضع تلقائي (i=1)');
                startHack();
            }, 1500);
        }

        // إضافة بعض النصوص الهادئة بشكل دوري
        setInterval(createHackerTexts, 10000);
    </script>
</body>
</html>
