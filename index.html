<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@ridermax077 | PRO HOST</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0a0f1a, #1a2538);
            color: white;
            text-align: center;
            direction: rtl;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* رأس الصفحة مع صور البطريق - تأثير بلي 4 */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 60px;
            border: 3px solid #00ffaa;
            box-shadow: 0 0 30px #00ffaa;
        }

        .penguin {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 4px solid #00ffaa;
            box-shadow: 0 0 20px #00ffaa;
            animation: flicker 1.5s infinite alternate; /* تأثير بلي 4 */
        }

        /* تأثير الوميض على الصور */
        @keyframes flicker {
            0% { opacity: 1; filter: brightness(1); border-color: #00ffaa; box-shadow: 0 0 20px #00ffaa; }
            25% { opacity: 0.8; filter: brightness(1.3); border-color: #ff00aa; box-shadow: 0 0 30px #ff00aa; }
            50% { opacity: 1; filter: brightness(1.5); border-color: #00aaff; box-shadow: 0 0 40px #00aaff; }
            75% { opacity: 0.7; filter: brightness(0.8); border-color: #ffaa00; box-shadow: 0 0 30px #ffaa00; }
            100% { opacity: 1; filter: brightness(1.2); border-color: #00ffaa; box-shadow: 0 0 20px #00ffaa; }
        }

        h1 {
            color: #00ffaa;
            text-shadow: 0 0 20px #00ffaa;
            font-size: 3.5rem;
        }

        /* شبكة الإصدارات */
        .version-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 30px 0;
        }

        .card {
            background: #1a2638;
            padding: 25px 35px;
            border-radius: 40px;
            border: 2px solid #00aaff;
            cursor: pointer;
            transition: 0.2s;
            font-size: 2rem;
            font-weight: bold;
        }

        .card.active {
            border-color: #00ffaa;
            box-shadow: 0 0 25px #00ffaa;
            background: #00ffaa10;
        }

        .card small {
            display: block;
            font-size: 0.9rem;
            color: #aabbcc;
            margin-top: 5px;
        }

        /* الأزرار */
        .btn {
            background: #00ffaa;
            color: black;
            padding: 20px 40px;
            border-radius: 60px;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            margin: 15px auto;
            border: none;
            box-shadow: 0 0 30px #00ffaa, 0 5px 0 #008855;
            transition: 0.1s;
            width: fit-content;
            display: inline-block;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 40px #00ffaa, 0 8px 0 #008855;
        }

        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 0 20px #00ffaa, 0 3px 0 #008855;
        }

        .btn.goldhen {
            background: #ffaa00;
            box-shadow: 0 0 30px #ffaa00, 0 5px 0 #aa5500;
        }

        /* سجل الأحداث */
        .log {
            background: #0a101a;
            border: 2px solid #00aaff;
            border-radius: 30px;
            margin-top: 30px;
            padding: 15px;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
            text-align: left;
            direction: ltr;
            width: 100%;
            max-width: 700px;
            font-size: 1rem;
        }

        .log div {
            padding: 5px;
            border-right: 4px solid #00ffaa;
            margin: 5px 0;
            background: #111c28;
            border-radius: 10px;
        }

        /* الإطار المنزلق (iframe) */
        #exploitFrame {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            transition: bottom 0.6s ease-in-out;
            z-index: 9999;
        }

        #exploitFrame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* تذييل */
        .footer {
            margin-top: 40px;
            color: #556677;
        }

        /* النص المتحرك "انزل من الشاشه كا انهو هكر" */
        .hacker-slide {
            position: fixed;
            top: -100px;
            left: 0;
            width: 100%;
            background: black;
            color: #00ffaa;
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            padding: 20px;
            border-bottom: 3px solid #00ffaa;
            box-shadow: 0 0 50px #00ffaa;
            z-index: 10000;
            animation: slideDown 10s forwards;
            text-shadow: 0 0 15px #00ffaa;
            font-family: 'Courier New', monospace;
            letter-spacing: 5px;
        }

        @keyframes slideDown {
            0% { top: -100px; }
            10% { top: 0; }
            90% { top: 0; }
            100% { top: -100px; }
        }

        /* رسالة النجاح المنبثقة */
        .success-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: black;
            border: 4px solid #00ffaa;
            border-radius: 50px;
            padding: 40px 60px;
            font-size: 4rem;
            color: #00ffaa;
            text-shadow: 0 0 40px #00ffaa;
            box-shadow: 0 0 100px #00ffaa;
            z-index: 10001;
            animation: pop 0.5s, fadeOut 1s 2s forwards;
            white-space: nowrap;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }

        @keyframes pop {
            0% { transform: translate(-50%, -50%) scale(0); }
            80% { transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://i.postimg.cc/Z5ct06Lm/Screenshot-20260315-194604.jpg" alt="Left Penguin" class="penguin">
        <h1>@ridermax077 💀</h1>
        <img src="https://i.postimg.cc/h4zBMzKT/Screenshot-20260315-194622.jpg" alt="Right Penguin" class="penguin">
    </div>

    <!-- اختيار الإصدار -->
    <div class="version-grid">
        <div class="card active" data-v="9.00">9.00 <small>مستقر</small></div>
        <div class="card" data-v="11.00">11.00 <small>تجريبي</small></div>
        <div class="card" data-v="5.05">5.05 <small>قديم</small></div>
    </div>

    <!-- الأزرار -->
    <div class="btn" onclick="startHack()">💀 هكرني اوبن بنيه</div>
    <div class="btn goldhen" onclick="downloadGoldhen()">📦 تحميل GoldHEN</div>

    <!-- سجل الأحداث -->
    <div class="log" id="log"></div>

    <!-- الإطار المنزلق (يظهر عند الضغط على زر الهكرنة) -->
    <div id="exploitFrame">
        <iframe id="frame" src="about:blank"></iframe>
    </div>

    <div class="footer">
        <p>© 2026 @ridermax077 | جميع الحقوق محفوظة</p>
    </div>

    <script>
        // عناصر الصفحة
        const logDiv = document.getElementById('log');
        const exploitFrame = document.getElementById('exploitFrame');
        const exploitIframe = document.getElementById('frame');
        const cards = document.querySelectorAll('.card');
        let selectedVersion = '9.00'; // افتراضي

        // تفعيل اختيار الإصدار
        cards.forEach(card => {
            card.addEventListener('click', () => {
                cards.forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                selectedVersion = card.dataset.v;
                addLog(`تم اختيار الإصدار ${selectedVersion}`);
            });
        });

        // دالة إضافة سجل
        function addLog(message) {
            const entry = document.createElement('div');
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        // دالة عرض النص المتحرك "انزل من الشاشه كا انهو هكر"
        function showHackerSlide() {
            const slide = document.createElement('div');
            slide.className = 'hacker-slide';
            slide.textContent = '🔻 انزل من الشاشه كا انهو هكر 🔻';
            document.body.appendChild(slide);
            // حذف العنصر بعد انتهاء الأنيميشن
            setTimeout(() => {
                slide.remove();
            }, 10000); // 10 ثوان
        }

        // دالة عرض رسالة النجاح المنبثقة
        function showSuccessMessage() {
            const popup = document.createElement('div');
            popup.className = 'success-popup';
            popup.textContent = '🔥 هكر مني لكه !! 🔥';
            document.body.appendChild(popup);
            // حذف العنصر بعد 3 ثوان
            setTimeout(() => {
                popup.remove();
            }, 3000);
        }

        // دالة فتح الإطار وبدء الهكرنة
        function startHack() {
            addLog('🚀 فتح الهوست الحقيقي...');
            showHackerSlide(); // إضافة النص المتحرك

            // اختيار الرابط حسب الإصدار
            let exploitUrl = '';
            if (selectedVersion === '9.00') {
                exploitUrl = 'https://bex19.github.io/313/?i=1';
            } else if (selectedVersion === '11.00') {
                exploitUrl = 'https://nightkinghost.com';
            } else if (selectedVersion === '5.05') {
                exploitUrl = 'https://leeful.github.io';
            }

            // تعيين الرابط في iframe
            exploitIframe.src = exploitUrl;

            // إظهار الإطار من الأسفل
            exploitFrame.style.bottom = '0';

            // مراقبة التفاعل مع الإطار (عند النقر داخله)
            const checkInteraction = setInterval(() => {
                if (document.activeElement === exploitIframe) {
                    addLog('📡 تم التفاعل مع الهوست...');
                    clearInterval(checkInteraction);

                    // بعد 6 ثوانٍ نغلق الإطار ونعرض رسالة النجاح
                    setTimeout(() => {
                        closeExploit();
                    }, 6000);
                }
            }, 500);

            // مهلة أمان (إذا لم يتفاعل المستخدم خلال 15 ثانية نغلق تلقائيًا)
            setTimeout(() => {
                clearInterval(checkInteraction);
                if (exploitFrame.style.bottom === '0px') {
                    addLog('⚠️ انتهت المهلة، إغلاق تلقائي');
                    closeExploit();
                }
            }, 20000);
        }

        // دالة إغلاق الإطار وإظهار رسالة النجاح
        function closeExploit() {
            exploitFrame.style.bottom = '-100%';
            exploitIframe.src = 'about:blank'; // إعادة تعيين المصدر
            addLog('🎉 هاي تهكيره مني لكه');
            addLog('🔥 GoldHEN مفعل بنجاح');
            showSuccessMessage(); // إضافة الرسالة المنبثقة
        }

        // دالة تحميل GoldHEN
        function downloadGoldhen() {
            addLog('📦 فتح صفحة تحميل GoldHEN...');
            window.open('https://github.com/GoldHEN/GoldHEN/releases/latest', '_blank');
        }

        // بدء تلقائي إذا وجد ?i=1 في الرابط
        if (window.location.search.includes('i=1')) {
            setTimeout(() => {
                addLog('⚡ وضع تلقائي (i=1)');
                startHack();
            }, 1500);
        }
    </script>
</body>
</html>
