const logPanel = document.getElementById('logPanel');
const startBtn = document.getElementById('startBtn');

// تسجيل log
function addLog(msg) {
    const entry = document.createElement('div');
    entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logPanel.appendChild(entry);
    logPanel.scrollTop = logPanel.scrollHeight;
}

// اختيار النسخة
versionCards.forEach(card => {
    card.addEventListener('click', () => {
        versionCards.forEach(c => c.style.borderColor = '#00aaff');
        card.style.borderColor = '#00ffaa';
        selectedVersion = card.dataset.version;
        addLog(`✅ تم اختيار الإصدار ${selectedVersion}`);
    });
});

// زر التهكير
startBtn.addEventListener('click', () => {

    addLog(`🚀 تحويل إلى موقع التفعيل...`);

    localStorage.setItem("hack_started", "yes");

    window.location.href = "https://bex19.github.io/313/";

});

// عند الرجوع
window.onload = function(){

    if(localStorage.getItem("hack_started") === "yes"){

        addLog("🎉 تم ابن بنيه الغالي 😎");
        addLog("🔥 GoldHEN مفعل بنجاح");

        localStorage.removeItem("hack_started");
