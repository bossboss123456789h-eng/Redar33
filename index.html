        // إنشاء نجوم الخلفية
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');

            slide.textContent = '🔻 انزل من الشاشه كا انهو هكر 🔻';
            document.body.appendChild(slide);

            const style = document.createElement('style');
            style.innerHTML = `
                @keyframes slideDownFade {
                    0% { top: -80px; opacity: 0; }
                    10% { top: 0; opacity: 1; }
                    90% { top: 0; opacity: 1; }
                    100% { top: -80px; opacity: 0; }

            `;
            document.head.appendChild(style);
            setTimeout(() => slide.remove(), 8000);

        // دالة إظهار رسالة النجاح بشكل جميل
        function showSuccessMessage() {
            // إزالة أي رسالة نجاح سابقة
            const oldMsg = document.querySelector('.success-message');
            if (oldMsg) oldMsg.remove();

            const msgDiv = document.createElement('div');
            msgDiv.className = 'success-message';
            msgDiv.innerHTML = `
                <i class="fas fa-skull"></i>
                <div class="main-text">هكر مني لكه !!</div>
                <div class="sub-text">تم اختراق النظام بنجاح</div>
                <button class="close-btn" onclick="this.parentElement.remove()">إغلاق</button>
            `;
            document.body.appendChild(msgDiv);

            // إضافة تأثير إضافي: تغيير لون الخلفية للحظات
            document.body.style.transition = 'background 0.5s';
            document.body.style.background = 'radial-gradient(circle at 20% 30%, #00aa33, #0b121c)';
            setTimeout(() => {
                document.body.style.background = 'radial-gradient(circle at 20% 30%, #1a2a3a, #0b121c)';
            }, 500);

            // إزالة الرسالة بعد 7 ثواني (اختياري)
            setTimeout(() => {
                if (msgDiv.parentNode) msgDiv.remove();
            }, 7000);
        }

        // نصوص خلفية عائمة
        function createFloatingTexts() {
            const texts = ['@ridermax707', 'PS4', 'HACK', '9.00', 'GOLDHEN', 'بيتك كضومي', 'ܐܬܐ ܕܚܫܘܟܐ', 'EXPLOIT'];
            for (let i = 0; i < 15; i++) {
                const span = document.createElement('div');
                span.className = 'floating-text';
                span.textContent = texts[Math.floor(Math.random() * texts.length)];
                span.style.left = Math.random() * 100 + '%';
                span.style.fontSize = (12 + Math.random() * 20) + 'px';
                span.style.animationDuration = (15 + Math.random() * 20) + 's';
                span.style.animationDelay = Math.random() * 10 + 's';
                document.body.appendChild(span);
                setTimeout(() => span.remove(), 30000);
            }
        }
        setInterval(createFloatingTexts, 8000);

        // دالة إظهار كلمات إضافية بطريقة الهكر عند الضغط على زر الهكر
        function showExtraHackerWords() {
            const extraWords = [
                'ACCESS GRANTED', 'ROOT', 'EXPLOIT', '0DAY', 'SHELL', 'BACKDOOR',
                'PAYLOAD', 'INJECT', 'CRACK', 'HACKED', 'BY @ridermax707', 'وو بيتك كضومي',
                'كضومي هاك', 'ܐܬܐ ܕܚܫܘܟܐ', 'فكيت الشيفرة', 'دخلت سيستماك'
            ];
            for (let i = 0; i < 20; i++) {
                const span = document.createElement('div');
                span.className = 'hacker-extra';
                span.textContent = extraWords[Math.floor(Math.random() * extraWords.length)];
                span.style.left = Math.random() * 100 + '%';
                span.style.top = Math.random() * 100 + '%';
                span.style.fontSize = (14 + Math.random() * 30) + 'px';
                span.style.animationDuration = (2 + Math.random() * 4) + 's';
                span.style.animationDelay = Math.random() * 2 + 's';
                span.style.color = `hsl(${Math.random() * 60 + 150}, 100%, 60%)`; // ألوان بين الأخضر والأزرق
                document.body.appendChild(span);
                setTimeout(() => span.remove(), 5000);
            }
        }

        // بدء الهكر
        function startHack() {
            addLog('🚀 فتح الهوست الحقيقي...');
            showHackerSlide();
            createFloatingTexts();
            showExtraHackerWords(); // إظهار الكلمات الإضافية

            let exploitUrl = '';
            if (selectedVersion === '9.00') exploitUrl = 'https://bex19.github.io/313/?i=1';
            // يمكن إضافة خيارات أخرى لكن بما أنه فقط 9.00 نستخدم هذا الرابط

            exploitIframe.src = exploitUrl;
            exploitFrame.style.bottom = '0';

            const checkInteraction = setInterval(() => {
                if (document.activeElement === exploitIframe) {
                    addLog('📡 تم التفاعل مع الهوست...');
                    clearInterval(checkInteraction);
                    setTimeout(() => closeExploit(), 6000);
                }
            }, 500);

            setTimeout(() => {
                clearInterval(checkInteraction);
                if (exploitFrame.style.bottom === '0px') {
                    addLog('⚠️ انتهت المهلة، إغلاق تلقائي');
                    closeExploit();
                }
            }, 20000);
        }

            exploitIframe.src = 'about:blank';
            addLog('🎉 هاي تهكيره مني لكه');
            addLog('🔥 GoldHEN مفعل بنجاح');
            showSuccessMessage(); // رسالة النجاح الجميلة
            createFloatingTexts();
            showExtraHackerWords(); // أيضاً بعد الإغلاق
        }

            addLog('📦 جاري التوجيه إلى أحدث إصدار GoldHEN...');
            window.open('https://github.com/GoldHEN/GoldHEN/releases/latest', '_blank');

        if (window.location.search.includes('i=1')) {
