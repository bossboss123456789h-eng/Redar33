<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@ridermax077 | PRO HOST (نسخة مجنونة)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            background: black;
            color: white;
            text-align: center;
            direction: rtl;
            font-family: 'Arial', sans-serif;
        }

        /* خلفية الجسيمات المتحركة */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* تأثير الخلفية المتدرجة المتحركة */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #000000, #0a0f1a, #1a0033, #000033);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: -2;
            opacity: 0.8;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* تأثير الشاشة المشوشة */
        .glitch-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,255,0,0.03) 0px, rgba(0,0,255,0.03) 2px, transparent 2px, transparent 4px);
            pointer-events: none;
            z-index: -1;
            animation: scanline 8s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        /* رأس الصفحة بتأثيرات جنونية */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px 40px;
            border-radius: 60px;
            border: 3px solid;
            border-color: #00ffaa #ff00aa #aa00ff #00aaff;
            animation: borderColorShift 3s infinite alternate, boxGlow 1.5s infinite alternate;
            z-index: 1;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(0, 255, 170, 0.5);
        }

        @keyframes borderColorShift {
            0% { border-color: #00ffaa #ff00aa #aa00ff #00aaff; }
            25% { border-color: #ffaa00 #00ffaa #ff00aa #aa00ff; }
            50% { border-color: #aa00ff #ffaa00 #00ffaa #ff00aa; }
            75% { border-color: #00aaff #aa00ff #ffaa00 #00ffaa; }
            100% { border-color: #ff00aa #00aaff #aa00ff #ffaa00; }
        }

        @keyframes boxGlow {
            0% { box-shadow: 0 0 30px #00ffaa, 0 0 60px #ff00aa; }
            100% { box-shadow: 0 0 60px #00aaff, 0 0 90px #aa00ff; }
        }

        .penguin {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid;
            animation: spin 4s linear infinite, crazyFlicker 0.5s infinite alternate;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes crazyFlicker {
            0% { filter: hue-rotate(0deg) brightness(1) contrast(1); border-color: #ff00aa; box-shadow: 0 0 40px #ff00aa; }
            20% { filter: hue-rotate(90deg) brightness(1.5) contrast(2); border-color: #00ffaa; box-shadow: 0 0 60px #00ffaa; transform: scale(1.1); }
            40% { filter: hue-rotate(180deg) brightness(0.8) contrast(1.5); border-color: #ffff00; box-shadow: 0 0 80px #ffff00; }
            60% { filter: hue-rotate(270deg) brightness(2) contrast(1.2); border-color: #ff5500; box-shadow: 0 0 100px #ff5500; transform: scale(0.9); }
            80% { filter: hue-rotate(360deg) brightness(1.2) contrast(2); border-color: #aa00ff; box-shadow: 0 0 120px #aa00ff; }
            100% { filter: hue-rotate(0deg) brightness(1) contrast(1); border-color: #00aaff; box-shadow: 0 0 40px #00aaff; }
        }

        h1 {
            font-size: 4rem;
            font-weight: bold;
            text-shadow: 0 0 20px #00ffaa, 0 0 40px #ff00aa, 0 0 60px #00aaff;
            animation: glitchText 2s infinite, typewriter 3s steps(20) 1s 1 normal both;
            white-space: nowrap;
            border-right: 3px solid #00ffaa;
            overflow: hidden;
            width: 0;
            animation: typewriter 3s steps(20) 1s 1 normal both, blinkCursor 0.75s step-end infinite, glitchText 2s infinite;
        }

        @keyframes typewriter {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blinkCursor {
            from, to { border-color: transparent; }
            50% { border-color: #00ffaa; }
        }

        @keyframes glitchText {
            0% { text-shadow: 0.05em 0 0 #00ffaa, -0.05em -0.025em 0 #ff00aa; }
            25% { text-shadow: -0.05em -0.025em 0 #00ffaa, 0.025em 0.05em 0 #ff00aa; }
            50% { text-shadow: 0.025em 0.05em 0 #00ffaa, 0.05em 0 0 #ff00aa; }
            75% { text-shadow: -0.025em 0 0 #00ffaa, -0.025em -0.05em 0 #ff00aa; }
            100% { text-shadow: 0.05em 0 0 #00ffaa, -0.05em -0.025em 0 #ff00aa; }
        }

        /* شبكة الإصدارات */
        .version-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin: 30px 0;
            z-index: 1;
        }

        .card {
            background: rgba(0, 0, 0, 0.8);
            padding: 30px 40px;
            border-radius: 50px;
            border: 2px solid #00ffaa;
            cursor: pointer;
            transition: 0.2s;
            font-size: 2.5rem;
            font-weight: bold;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 30px #00ffaa;
            animation: cardFloat 3s infinite alternate;
        }

        .card.active {
            border-color: #ff00aa;
            box-shadow: 0 0 50px #ff00aa;
            transform: scale(1.1);
        }

        @keyframes cardFloat {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        .card small {
            display: block;
            font-size: 1rem;
            color: #aaccff;
        }

        /* الأزرار */
        .btn {
            background: linear-gradient(45deg, #00ffaa, #00aaff);
            color: black;
            padding: 20px 50px;
            border-radius: 60px;
            font-size: 2.2rem;
            font-weight: bold;
            cursor: pointer;
            margin: 15px auto;
            border: none;
            box-shadow: 0 0 40px #00ffaa, 0 10px 0 #008855;
            transition: 0.1s;
            width: fit-content;
            display: inline-block;
            animation: btnPulse 2s infinite;
        }

        @keyframes btnPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); box-shadow: 0 0 60px #ff00aa, 0 10px 0 #880055; }
            100% { transform: scale(1); }
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 60px #00ffaa, 0 15px 0 #008855;
        }

        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 0 30px #00ffaa, 0 5px 0 #008855;
        }

        .btn.goldhen {
            background: linear-gradient(45deg, #ffaa00, #ff5500);
            box-shadow: 0 0 40px #ffaa00, 0 10px 0 #aa5500;
        }

        /* سجل الأحداث */
        .log {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #00ffaa;
            border-radius: 30px;
            margin-top: 30px;
            padding: 15px;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
            text-align: left;
            direction: ltr;
            width: 100%;
            max-width: 700px;
            font-size: 1rem;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 30px #00ffaa;
            animation: logGlow 3s infinite alternate;
        }

        @keyframes logGlow {
            from { box-shadow: 0 0 20px #00ffaa; }
            to { box-shadow: 0 0 40px #ff00aa; }
        }

        .log div {
            padding: 5px;
            border-right: 4px solid #00ffaa;
            margin: 5px 0;
            background: rgba(0, 20, 40, 0.8);
            border-radius: 10px;
        }

        /* الإطار المنزلق */
        #exploitFrame {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            transition: bottom 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            z-index: 9999;
        }

        #exploitFrame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* تذييل */
        .footer {
            margin-top: 40px;
            color: #99aabb;
            z-index: 1;
            animation: footerFlicker 3s infinite;
        }

        @keyframes footerFlicker {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* النص المتحرك */
        .hacker-slide {
            position: fixed;
            top: -100px;
            left: 0;
            width: 100%;
            background: black;
            color: #00ffaa;
            text-align: center;
            font-size: 3rem;
            font-weight: bold;
            padding: 30px;
            border-bottom: 4px solid #00ffaa;
            box-shadow: 0 0 80px #00ffaa;
            z-index: 10000;
            animation: slideDown 8s forwards;
            text-shadow: 0 0 30px #00ffaa;
            font-family: 'Courier New', monospace;
            letter-spacing: 10px;
        }

        @keyframes slideDown {
            0% { top: -100px; }
            10% { top: 0; }
            90% { top: 0; }
            100% { top: -100px; }
        }

        /* رسالة النجاح */
        .success-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: black;
            border: 6px solid;
            border-color: #00ffaa #ff00aa #aa00ff #00aaff;
            border-radius: 80px;
            padding: 60px 80px;
            font-size: 5rem;
            color: #00ffaa;
            text-shadow: 0 0 60px #00ffaa, 0 0 120px #ff00aa;
            box-shadow: 0 0 150px #00ffaa;
            z-index: 10001;
            animation: popIn 0.5s, rotateBorder 3s infinite linear;
            white-space: nowrap;
            font-weight: bold;
        }

        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0); }
            80% { transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        @keyframes rotateBorder {
            0% { border-color: #00ffaa #ff00aa #aa00ff #00aaff; }
            25% { border-color: #ff00aa #aa00ff #00aaff #00ffaa; }
            50% { border-color: #aa00ff #00aaff #00ffaa #ff00aa; }
            75% { border-color: #00aaff #00ffaa #ff00aa #aa00ff; }
            100% { border-color: #00ffaa #ff00aa #aa00ff #00aaff; }
        }

        /* نصوص هكر عشوائية متحركة */
        .hacker-text {
            position: fixed;
            font-family: 'Courier New', monospace;
            font-size: 20px;
            font-weight: bold;
            z-index: 10002;
            pointer-events: none;
            animation: flyAround 10s linear infinite;
            white-space: nowrap;
        }

        @keyframes flyAround {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
            25% { transform: translate(100px, -50px) rotate(90deg); }
            50% { transform: translate(-50px, 100px) rotate(180deg); opacity: 0.8; }
            75% { transform: translate(50px, -100px) rotate(270deg); }
            100% { transform: translate(0, 0) rotate(360deg); opacity: 1; }
        }

        /* تنسيق خاص */
        .username-highlight {
            color: #ffaa00;
            text-shadow: 0 0 20px #ffaa00, 0 0 40px #ff5500;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    <canvas id="particles-canvas"></canvas>
    <div class="glitch-overlay"></div>

    <div class="header">
        <img src="https://i.postimg.cc/Z5ct06Lm/Screenshot-20260315-194604.jpg" alt="Left Penguin" class="penguin">
        <h1>@ridermax077 💀</h1>
        <img src="https://i.postimg.cc/h4zBMzKT/Screenshot-20260315-194622.jpg" alt="Right Penguin" class="penguin">
    </div>

    <!-- اختيار الإصدار -->
    <div class="version-grid">
        <div class="card active" data-v="9.00">9.00 <small>مستقر</small></div>
        <div class="card" data-v="11.00">11.00 <small>تجريبي</small></div>
        <div class="card" data-v="5.05">5.05 <small>قديم</small></div>
    </div>

    <!-- الأزرار -->
    <div class="btn" onclick="startHack()">💀 هكرني اوبن بنيه</div>
    <div class="btn goldhen" onclick="downloadGoldhen()">📦 تحميل GoldHEN</div>

    <!-- سجل الأحداث -->
    <div class="log" id="log"></div>

    <!-- الإطار المنزلق -->
    <div id="exploitFrame">
        <iframe id="frame" src="about:blank"></iframe>
    </div>

    <div class="footer">
        <p>© 2026 @ridermax077 | جميع الحقوق محفوظة</p>
    </div>

    <!-- صوت الهكر (اختياري) -->
    <audio id="hackerSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" preload="auto"></audio>

    <script>
        // عناصر الصفحة
        const logDiv = document.getElementById('log');
        const exploitFrame = document.getElementById('exploitFrame');
        const exploitIframe = document.getElementById('frame');
        const cards = document.querySelectorAll('.card');
        let selectedVersion = '9.00';
        const sound = document.getElementById('hackerSound');

        // تفعيل الصوت عند أول تفاعل
        let soundEnabled = false;
        function enableSound() {
            if (!soundEnabled) {
                sound.play().then(() => {
                    sound.pause();
                    sound.currentTime = 0;
                    soundEnabled = true;
                }).catch(e => console.log('الصوت يحتاج تفاعل'));
            }
        }
        document.body.addEventListener('click', enableSound, { once: true });

        cards.forEach(card => {
            card.addEventListener('click', () => {
                cards.forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                selectedVersion = card.dataset.v;
                addLog(`تم اختيار الإصدار ${selectedVersion}`);
            });
        });

        function addLog(message) {
            const entry = document.createElement('div');
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function showHackerSlide() {
            const slide = document.createElement('div');
            slide.className = 'hacker-slide';
            slide.textContent = '🔻 انزل من الشاشه كا انهو هكر 🔻';
            document.body.appendChild(slide);
            setTimeout(() => {
                slide.remove();
            }, 8000);
        }

        function showSuccessMessage() {
            const popup = document.createElement('div');
            popup.className = 'success-popup';
            popup.textContent = '🔥 هكر مني لكه !! 🔥';
            document.body.appendChild(popup);
            setTimeout(() => {
                popup.remove();
            }, 5000);
        }

        // نصوص هكر عشوائية
        function createHackerTexts() {
            const texts = [
                '@ridermax077', '@ridermax077', 'بيتك كضومي', 'كضومي هاك', 'بغداد تايم', 'عراق هكر',
                'ܐܬܐ ܕܚܫܘܟܐ', 'ܫܠܡܐ ܥܠ ܣܝܣܛܡ', 'فكيت الشيفرة', 'دخلت سيستماك', 'هكرتك يا عم',
                'ROOT ACCESS', 'EXPLOIT SUCCESS', 'SHELL OPEN', 'BACKDOOR', '0DAY', 'MALWARE',
                'SYSTEM HACKED', 'DATA LEAK', 'CREDENTIALS DUMP', 'PAYLOAD INJECTED'
            ];
            for (let i = 0; i < 30; i++) {
                const span = document.createElement('div');
                span.className = 'hacker-text';
                span.textContent = texts[Math.floor(Math.random() * texts.length)];
                span.style.left = Math.random() * 100 + '%';
                span.style.top = Math.random() * 100 + '%';
                span.style.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
                span.style.fontSize = (15 + Math.random() * 40) + 'px';
                span.style.animationDuration = (5 + Math.random() * 15) + 's';
                span.style.animationDelay = Math.random() * 5 + 's';
                document.body.appendChild(span);
                setTimeout(() => span.remove(), 15000);
            }
        }

        // تأثير الجسيمات
        function initParticles() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', resize);
            resize();

            const particleCount = 150;
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    size: Math.random() * 3 + 1,
                    color: `hsl(${Math.random() * 360}, 100%, 60%)`
                });
            }

            function draw() {
                ctx.clearRect(0, 0, width, height);
                particles.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 15;
                    ctx.fill();

                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < 0 || p.x > width) p.vx *= -1;
                    if (p.y < 0 || p.y > height) p.vy *= -1;
                });
                requestAnimationFrame(draw);
            }
            draw();
        }
        initParticles();

        // بدء الهكر
        function startHack() {
            addLog('🚀 فتح الهوست الحقيقي...');
            showHackerSlide();
            createHackerTexts();
            if (soundEnabled) {
                sound.play();
            }

            let exploitUrl = '';
            if (selectedVersion === '9.00') exploitUrl = 'https://bex19.github.io/313/?i=1';
            else if (selectedVersion === '11.00') exploitUrl = 'https://nightkinghost.com';
            else if (selectedVersion === '5.05') exploitUrl = 'https://leeful.github.io';

            exploitIframe.src = exploitUrl;
            exploitFrame.style.bottom = '0';

            const checkInteraction = setInterval(() => {
                if (document.activeElement === exploitIframe) {
                    addLog('📡 تم التفاعل مع الهوست...');
                    clearInterval(checkInteraction);
                    setTimeout(() => closeExploit(), 6000);
                }
            }, 500);

            setTimeout(() => {
                clearInterval(checkInteraction);
                if (exploitFrame.style.bottom === '0px') {
                    addLog('⚠️ انتهت المهلة، إغلاق تلقائي');
                    closeExploit();
                }
            }, 20000);
        }

        function closeExploit() {
            exploitFrame.style.bottom = '-100%';
            exploitIframe.src = 'about:blank';
            addLog('🎉 هاي تهكيره مني لكه');
            addLog('🔥 GoldHEN مفعل بنجاح');
            showSuccessMessage();
            createHackerTexts();
        }

        function downloadGoldhen() {
            addLog('📦 فتح صفحة تحميل GoldHEN...');
            window.open('https://github.com/GoldHEN/GoldHEN/releases/latest', '_blank');
        }

        if (window.location.search.includes('i=1')) {
            setTimeout(() => {
                addLog('⚡ وضع تلقائي (i=1)');
                startHack();
            }, 1500);
        }

        // إضافة نصوص دورية
        setInterval(createHackerTexts, 4000);
    </script>
</body>
</html>
